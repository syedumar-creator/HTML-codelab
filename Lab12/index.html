<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Form</title>
    <style>
        body {
            background-color: lightgray;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 60%;
            padding: 20px;
            border: 2px solid black;
            border-radius: 10px;
            background-color: white;
            margin: auto;
        }

        h1 {
            color: white;
            background-color: darkblue;
            text-align: center;
            padding: 15px;
        }

        label {
            color: black;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Registration Form</h1>
        <form>
            <label for="dep">Department</label>
            <select id="dep" name="dep">
                <option value="Computer Science">Computer Science</option>
                <option value="Electrical Engineering">Electrical Engineering</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
            </select>
            <label for="sem">Semester</label>
            <select id="sem" name="sem">
                <option value="1st">1st</option>
                <option value="2nd">2nd</option>
                <option value="3rd">3rd</option>
                <option value="4th">4th</option>
                <option value="5th">5th</option>
                <option value="6th">6th</option>
                <option value="7th">7th</option>
                <option value="8th">8th</option>
            </select>
            <label for="shift">Examination Shift Time</label>
            <select id="shift" name="shift">
                <option value="Morning">Morning</option>
                <option value="Evening">Evening</option>
            </select>
            <br><br>
            <label for="center">Preferred Exam Center</label>
            <select id="center" name="center">
                <option value="Lahore">Lahore</option>
                <option value="Sargodha">Sargodha</option>
                <option value="Islamabad">Islamabad</option>
            </select>
            <label for="level">Exam Preparation Level</label>
            <select id="level" name="level">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select><br><br>
            <fieldset>
            <label for="sel">Course Selection</label><br><br>
            <input id="sel" name="sel" type="checkbox">CS101 Programming Fundamentals<br>
            <input id="sel" name="sel" type="checkbox">EE201 Circuit Analysis<br>
            <input id="sel" name="sel" type="checkbox">Calculus<br>
            <input id="sel" name="sel" type="checkbox">DM<br>
            <input id="sel" name="sel" type="checkbox">English<br>
            <input id="sel" name="sel" type="checkbox">Islamiat</fieldset><br>
            <label for="id">Student ID</label>
            <input id="id" name="id" type="number" autocomplete="on">
            <label for="pwd">Password</label>
            <input id="pwd" name="pwd" type="password" autocomplete="on"><br><br>
            <label for="address">Email Address</label>
            <input id="address" name="address" type="email" autocomplete="on">
            <label for="no">Contact Number</label>
            <input id="no" name="no" type="tel" autocomplete="on"><br><br>
            <label for="birth">Date of Birth</label>
            <input id="birth" name="birth" type="date"><br><br>
            <label for="g">Gender</label>
            <input id="g" name="g" type="radio"> Male
            <input id="g" name="g" type="radio"> Female
            <br><br>
            <label for="card">Upload Student Card</label>
            <input id="card" name="card" type="file"><br><br>
            <label for="co">Favorite Color Theme</label>
            <input id="co" name="co" type="color"><br><br>
            <label for="level">Exam Preparation Level (Beginner/Intermediate/Advanced)</label>
            <input id="level" name="level" type="range"><br><br>
            <label for="ins">Remarks/Special Instructions</label>
            <textarea id="ins" name="ins" rows="5" cols="30">Write your feedback here!</textarea><br><br>
            <input type="reset" value="Reset">
            <input type="submit" value="Submit">
        </form>
    </div>
</body>

</html>
